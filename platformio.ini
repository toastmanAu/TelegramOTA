; TelegramOTA — development / test build
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    toastmanAu/TelegramOTA
    bblanchon/ArduinoJson @ ^7.0.0
monitor_speed = 115200
build_flags =
    -DTOTA_POLL_INTERVAL_MS=5000
    -DTOTA_LOG_BUFFER_LINES=50

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
lib_deps =
    toastmanAu/TelegramOTA
    bblanchon/ArduinoJson @ ^7.0.0
monitor_speed = 115200
